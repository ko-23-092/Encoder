<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSphere Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>CRYPTOSPHERE</h1>

    <div class="input-section">
        <label>Текст для обработки</label>
        <textarea id="mainInput" placeholder="Введите ваше сообщение здесь..."></textarea>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Алгоритм</label>
            <select id="algo">
                <option value="caesar">Шифр Цезаря</option>
                <option value="atbash">Шифр Атбаша</option>
                <option value="morse">Азбука Морзе</option>
                <option value="vigenere">Шифр Виженера</option>
            </select>
        </div>
        <div class="control-group">
            <label>Язык</label>
            <select id="lang">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="control-group">
            <label>Ключ / Сдвиг</label>
            <input type="text" id="key" value="3">
        </div>
    </div>

    <div class="buttons">
        <button id="encryptBtn" class="encrypt-btn">Зашифровать</button>
        <button id="decryptBtn" class="decrypt-btn">Расшифровать</button>
    </div>

    <div class="result-box">
        <label>Результат:</label>
        <div id="output">...</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
