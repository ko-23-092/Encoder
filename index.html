<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSphere | 楔懈褎褉芯胁邪薪懈械</title>
    <style>
        :root {
            --bg: #0a111e;
            --card-bg: #141d2f;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --text: #ffffff;
            --muted-text: #94a3b8;
            --field-bg: #0a111e;
            --field-border: #2d3b55;
            --success: #00ff88;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent body scroll, container will handle it */
        }

        .container {
            background: var(--card-bg);
            width: 95%;
            max-width: 1100px; /* 小写械谢邪薪芯 褕懈褉械 */
            height: 90vh; /* 袟邪薪懈屑邪械褌 90% 胁褘褋芯褌褘 褝泻褉邪薪邪 */
            padding: 3rem; /* 袘芯谢褜褕械 芯褌褋褌褍锌芯胁 */
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7), 0 0 20px var(--accent-glow);
            border: 2px solid var(--accent-glow);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto; /* 袩芯蟹胁芯谢褟械褌 锌褉芯泻褉褍褔懈胁邪褌褜 褋芯写械褉卸懈屑芯械 */
        }

        h1 {
            text-align: center;
            font-size: 3rem; /* 袣褉褍锌薪械械 蟹邪谐芯谢芯胁芯泻 */
            margin: 0;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .group-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-size: 1rem; /* 袣褉褍锌薪械械 锌芯写锌懈褋懈 */
            color: var(--muted-text);
            text-transform: uppercase;
            padding-left: 5px;
            letter-spacing: 1px;
        }

        textarea, select, input {
            background: var(--field-bg);
            border: 2px solid var(--field-border);
            color: white;
            padding: 18px; /* 袘芯谢褜褕械 芯褌褋褌褍锌芯胁 胁薪褍褌褉懈 锌芯谢械泄 */
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            font-size: 1.1rem; /* 袣褉褍锌薪械械 褌械泻褋褌 胁 锌芯谢褟褏 */
        }

        textarea:focus, select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        textarea {
            resize: none;
            height: 200px; /* 袘芯谢褜褕械 屑械褋褌邪 写谢褟 褌械泻褋褌邪 */
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1fr; /* 孝褉懈 泻芯谢芯薪泻懈 */
            gap: 2rem;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        button {
            padding: 20px; /* 袣褉褍锌薪械械 泻薪芯锌泻懈 */
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem; /* 袣褉褍锌薪械械 褌械泻褋褌 泻薪芯锌芯泻 */
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-encrypt {
            background: var(--accent);
            color: #0a111e;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-decrypt {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-3px);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .result-area {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border-left: 5px solid var(--success);
            padding: 2rem;
            min-height: 100px;
        }

        #resultText {
            word-break: break-all;
            font-family: 'Courier New', monospace;
            color: var(--success);
            font-size: 1.2rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CRYPTOSPHERE</h1>
    
    <div class="group-container">
        <label>袠褋褏芯写薪褘泄 褌械泻褋褌</label>
        <textarea id="inputText" placeholder="袙胁械写懈褌械 褌械泻褋褌..."></textarea>
    </div>

    <div class="config-grid">
        <div class="group-container">
            <label>袗谢谐芯褉懈褌屑</label>
            <select id="cipherType">
                <option value="caesar">楔懈褎褉 笑械蟹邪褉褟</option>
                <option value="vigenere">楔懈褎褉 袙懈卸械薪械褉邪</option>
            </select>
        </div>
        
        <div class="group-container">
            <label>携蟹褘泻</label>
            <select id="cipherLanguage">
                <option value="ru">袪褍褋褋泻懈泄</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="group-container">
            <label>袣谢褞褔 / 小写胁懈谐</label>
            <input type="text" id="cipherKey" placeholder="袧邪锌褉: 3 懈谢懈 KEY">
        </div>
    </div>

    <div class="actions">
        <button class="btn-encrypt" onclick="processText('encrypt')">袟邪褕懈褎褉芯胁邪褌褜</button>
        <button class="btn-decrypt" onclick="processText('decrypt')">袪邪褋褕懈褎褉芯胁邪褌褜</button>
    </div>

    <div class="group-container">
        <label>袪械蟹褍谢褜褌邪褌:</label>
        <div class="result-area">
            <div id="resultText">...</div>
        </div>
    </div>
</div>

<script>
    const alphabets = {
        ru: '邪斜胁谐写械褢卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟',
        en: 'abcdefghijklmnopqrstuvwxyz'
    };

    function processText(mode) {
        const inputText = document.getElementById('inputText').value;
        const cipherType = document.getElementById('cipherType').value;
        const language = document.getElementById('cipherLanguage').value;
        const key = document.getElementById('cipherKey').value;
        const resultElement = document.getElementById('resultText');

        if (!inputText) {
            resultElement.innerText = "袨楔袠袘袣袗: 袧械褌 褌械泻褋褌邪.";
            return;
        }
        if (!key) {
            resultElement.innerText = "袨楔袠袘袣袗: 袧械褌 泻谢褞褔邪.";
            return;
        }

        let result = "";

        switch (cipherType) {
            case "caesar":
                const shift = parseInt(key);
                if (isNaN(shift)) {
                    result = "袨楔袠袘袣袗: 袣谢褞褔 写谢褟 笑械蟹邪褉褟 写芯谢卸械薪 斜褘褌褜 褔懈褋谢芯屑.";
                } else {
                    result = caesarCipher(inputText, shift, language, mode);
                }
                break;
            case "vigenere":
                result = vigenereCipher(inputText, key, language, mode);
                break;
            // 袛芯斜邪胁褜 写褉褍谐懈械 褕懈褎褉褘 蟹写械褋褜
            default:
                result = "袨楔袠袘袣袗: 袧械懈蟹胁械褋褌薪褘泄 褕懈褎褉.";
        }

        resultElement.innerText = result;
    }

    // --- 袥芯谐懈泻邪 楔懈褎褉邪 笑械蟹邪褉褟 ---
    function caesarCipher(text, shift, lang, mode) {
        const alphabet = alphabets[lang];
        if (!alphabet) return "袨楔袠袘袣袗: 携蟹褘泻 薪械 锌芯写写械褉卸懈胁邪械褌褋褟.";
        const alphabetLen = alphabet.length;
        if (mode === 'decrypt') shift = (alphabetLen - (shift % alphabetLen)) % alphabetLen; // 袠薪胁械褉褌懈褉褍械屑 褋写胁懈谐

        return text.split('').map(char => {
            const isUpper = char === char.toUpperCase();
            const lowerChar = char.toLowerCase();
            const index = alphabet.indexOf(lowerChar);

            if (index === -1) return char; // 袨褋褌邪胁谢褟械屑 蟹薪邪泻懈 锌褉械锌懈薪邪薪懈褟 懈 锌褉芯斜械谢褘

            let newIndex = (index + shift) % alphabetLen;
            const newChar = alphabet[newIndex];
            return isUpper ? newChar.toUpperCase() : newChar;
        }).join('');
    }

    // --- 袥芯谐懈泻邪 楔懈褎褉邪 袙懈卸械薪械褉邪 ---
    function vigenereCipher(text, key, lang, mode) {
        const alphabet = alphabets[lang];
        if (!alphabet) return "袨楔袠袘袣袗: 携蟹褘泻 薪械 锌芯写写械褉卸懈胁邪械褌褋褟.";
        const alphabetLen = alphabet.length;
        key = key.toLowerCase();
        
        let keyIndex = 0;
        return text.split('').map(char => {
            const isUpper = char === char.toUpperCase();
            const lowerChar = char.toLowerCase();
            const charIndex = alphabet.indexOf(lowerChar);

            if (charIndex === -1) return char; // 袨褋褌邪胁谢褟械屑 褋懈屑胁芯谢褘 胁薪械 邪谢褎邪胁懈褌邪

            // 袘械褉械屑 褌械泻褍褖懈泄 褋懈屑胁芯谢 泻谢褞褔邪
            const keyChar = key[keyIndex % key.length];
            const keyCharIndex = alphabet.indexOf(keyChar);
            
            // 袝褋谢懈 褋懈屑胁芯谢 泻谢褞褔邪 薪械 懈蟹 邪谢褎邪胁懈褌邪, 锌褉芯锌褍褋泻邪械屑 械谐芯
            if (keyCharIndex === -1) {
                keyIndex++; // 袩褉芯锌褍褋泻邪械屑 泻谢褞褔, 薪芯 胁芯蟹胁褉邪褖邪械屑 懈褋褏芯写薪褘泄 褋懈屑胁芯谢
                return char;
            }

            let newIndex;
            if (mode === 'encrypt') {
                newIndex = (charIndex + keyCharIndex) % alphabetLen;
            } else {
                newIndex = (charIndex - keyCharIndex + alphabetLen) % alphabetLen;
            }

            const newChar = alphabet[newIndex];
            keyIndex++;
            return isUpper ? newChar.toUpperCase() : newChar;
        }).join('');
    }
</script>

</body>
</html>
