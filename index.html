<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSphere MAX</title>
    <style>
        :root {
            --bg: #050a14;
            --card-bg: #0f172a;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text: #ffffff;
            --field: #1e293b;
            --success: #00ff9d;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        .container {
            width: 95vw;
            height: 90vh;
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px var(--accent-glow);
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            padding: 40px;
            box-sizing: border-box;
            gap: 25px;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 3.5rem;
            letter-spacing: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: var(--field);
            border: 2px solid #334155;
            border-radius: 20px;
            color: white;
            padding: 25px;
            font-size: 1.4rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr;
            gap: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
        }

        select, input {
            padding: 18px;
            background: var(--field);
            border: 2px solid #334155;
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        button {
            padding: 25px;
            border-radius: 20px;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .encrypt-btn {
            background: var(--accent);
            color: #000;
        }

        .decrypt-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        .result-box {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 20px;
            border-left: 8px solid var(--success);
            min-height: 80px;
            font-family: monospace;
            font-size: 1.5rem;
            color: var(--success);
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CRYPTOSPHERE</h1>

    <div class="input-section">
        <label>Текст для обработки</label>
        <textarea id="mainInput" placeholder="Введите ваше сообщение здесь..."></textarea>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Алгоритм</label>
            <select id="algo">
                <option value="caesar">Шифр Цезаря</option>
                <option value="atbash">Шифр Атбаша</option>
                <option value="morse">Азбука Морзе</option>
            </select>
        </div>
        <div class="control-group">
            <label>Язык</label>
            <select id="lang">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="control-group">
            <label>Ключ / Сдвиг</label>
            <input type="text" id="key" value="3">
        </div>
    </div>

    <div class="buttons">
        <button class="encrypt-btn" onclick="run(true)">Зашифровать</button>
        <button class="decrypt-btn" onclick="run(false)">Расшифровать</button>
    </div>

    <div class="result-box" id="output">Результат появится здесь...</div>
</div>

<script>
    const alphabets = {
        ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя",
        en: "abcdefghijklmnopqrstuvwxyz"
    };

    const morseMap = {
        'а': '.-', 'б': '-...', 'в': '.--', 'г': '--.', 'д': '-..', 'е': '.', 'ё': '.', 'ж': '...-', 'з': '--..',
        'и': '..', 'й': '.---', 'к': '-.-', 'л': '.-..', 'м': '--', 'н': '-.', 'о': '---', 'п': '.--.',
        'р': '.-.', 'с': '...', 'т': '-', 'у': '..-', 'ф': '..-.', 'х': '....', 'ц': '-.-.', 'ч': '---.',
        'ш': '----', 'щ': '--.-', 'ъ': '--.--', 'ы': '-.--', 'ь': '-..-', 'э': '..-..', 'ю': '..--', 'я': '.-.-',
        'a': '.-', 'b': '-...', 'c': '-.-.', 'd': '-..', 'e': '.', 'f': '..-.', 'g': '--.', 'h': '....',
        'i': '..', 'j': '.---', 'k': '-.-', 'l': '.-..', 'm': '--', 'n': '-.', 'o': '---', 'p': '.--.',
        'q': '--.-', 'r': '.-.', 's': '...', 't': '-', 'u': '..-', 'v': '...-', 'w': '.--', 'x': '-..-',
        'y': '-.--', 'z': '--..', '1': '.----', '2': '..---', '3': '...--', '4': '....-', '5': '.....',
        '6': '-....', '7': '--...', '8': '---..', '9': '----.', '0': '-----', ' ': '/'
    };

    function run(isEncrypt) {
        const text = document.getElementById('mainInput').value;
        const algo = document.getElementById('algo').value;
        const lang = document.getElementById('lang').value;
        const key = document.getElementById('key').value;
        let result = "";

        if (!text) {
            document.getElementById('output').innerText = "Введите текст!";
            return;
        }

        if (algo === "caesar") {
            let shift = parseInt(key) || 0;
            if (!isEncrypt) shift = alphabets[lang].length - (shift % alphabets[lang].length);
            result = caesar(text, shift, alphabets[lang]);
        } 
        else if (algo === "atbash") {
            result = atbash(text, alphabets[lang]);
        }
        else if (algo === "morse") {
            result = isEncrypt ? toMorse(text) : fromMorse(text);
        }

        document.getElementById('output').innerText = result;
    }

    function caesar(text, shift, alphabet) {
        return text.split('').map(char => {
            const lowChar = char.toLowerCase();
            const idx = alphabet.indexOf(lowChar);
            if (idx === -1) return char;
            let newIdx = (idx + shift) % alphabet.length;
            const resChar = alphabet[newIdx];
            return char === char.toUpperCase() ? resChar.toUpperCase() : resChar;
        }).join('');
    }

    function atbash(text, alphabet) {
        const rev = alphabet.split('').reverse().join('');
        return text.split('').map(char => {
            const idx = alphabet.indexOf(char.toLowerCase());
            if (idx === -1) return char;
            const resChar = rev[idx];
            return char === char.toUpperCase() ? resChar.toUpperCase() : resChar;
        }).join('');
    }

    function toMorse(text) {
        return text.toLowerCase().split('').map(char => morseMap[char] || char).join(' ');
    }

    function fromMorse(text) {
        const reverseMorse = Object.fromEntries(Object.entries(morseMap).map(([k, v]) => [v, k]));
        return text.split(' ').map(code => reverseMorse[code] || code).join('');
    }
</script>

</body>
</html>
